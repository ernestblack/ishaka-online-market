<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >
  <title>
    Login
  </title>

  <link
    rel="stylesheet"
    href="css/style.css"
  >
</head>

<body class="auth-page">

  <div class="auth-container">

    <h1>
      Login
    </h1>

    <!-- EMAIL -->

    <input
      type="email"
      id="loginEmail"
      placeholder="Email"
    >

    <br><br>

    <!-- PASSWORD -->

    <input
      type="password"
      id="loginPassword"
      placeholder="Password"
    >

    <br><br>

    <!-- LOGIN BUTTON -->

    <button id="loginBtn">

      Login

    </button>

    <br><br>

    <p>

      Don't have an account?

      <a href="register.html">

        Register

      </a>

    </p>

  </div>

  <script
    type="module"
    src="js/auth.js"
  ></script>

</body>

</html>
