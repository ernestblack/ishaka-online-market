<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Register
  </title>

  <link
    rel="stylesheet"
    href="css/style.css"
  >

</head>

<body class="auth-page">

  <div class="auth-container">

    <h1>
      Create Account
    </h1>

    <!-- FULL NAME -->

    <input
      type="text"
      id="fullName"
      placeholder="Full Name"
    >

    <br><br>

    <!-- EMAIL -->

    <input
      type="email"
      id="email"
      placeholder="Email"
    >

    <br><br>

    <!-- PASSWORD -->

    <input
      type="password"
      id="password"
      placeholder="Password"
    >

    <br><br>

    <!-- ROLE -->

    <select id="role">

      <option value="">
        Select Role
      </option>

      <option value="student">
        Student
      </option>

      <option value="vendor">
        Vendor
      </option>

    </select>

    <br><br>

    <!-- REGISTER BUTTON -->

    <button id="registerBtn">

      Register

    </button>

    <br><br>

    <p>

      Already have an account?

      <a href="login.html">

        Login

      </a>

    </p>

  </div>
  <script
  type="module"
  src="js/auth.js"
></script>

</body>

</html>
